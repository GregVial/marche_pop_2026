<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mots Croisés</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100dvh;padding-bottom:168px}
.hdr{position:sticky;top:0;z-index:50;background:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hdr-title{text-align:center;padding:10px 16px 8px;font-size:14px;font-weight:800;letter-spacing:4px;color:#fff;border-bottom:1px solid #1e293b}
.clue-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;min-height:48px}
.cbadge{background:#fbbf24;color:#0f172a;font-weight:800;padding:3px 8px;border-radius:4px;font-size:12px;white-space:nowrap;flex-shrink:0}
.ctxt{font-size:12.5px;line-height:1.4;color:#cbd5e1}
.cph{color:#475569;font-style:italic;font-size:12px}
.grid-area{overflow-x:auto;padding:14px 12px;-webkit-overflow-scrolling:touch}
.cw-grid{display:inline-grid;gap:1.5px;background:#0f172a;border:2px solid #0f172a;border-radius:3px}
.gc{width:36px;height:36px;background:#0f172a;position:relative}
.gc.on{background:#fff;cursor:pointer}
.gc.on.yi{background:#FFE500}
.gc.on.hi{background:#bfdbfe}
.gc.on.yhi{background:#d4c400}
.gc.on.ok{background:#86efac}
.gc.on.ko{background:#fca5a5}
.gc.on.sel{background:#2563eb}
.nl{position:absolute;top:1px;left:2px;font-size:7px;font-weight:800;line-height:1;color:#374151;pointer-events:none;z-index:2}
.gc.on.sel .nl{color:rgba(255,255,255,.75)}
.lt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#111827;pointer-events:none;z-index:3}
.gc.on.sel .lt{color:#fff}
.gc.on.ok .lt{color:#065f46}
.gc.on.ko .lt{color:#991b1b}
#success{display:none;margin:0 12px 14px;background:#d1fae5;border:2px solid #6ee7b7;border-radius:10px;padding:14px;text-align:center;font-size:15px;font-weight:700;color:#065f46;letter-spacing:1px}
.mystery-section{padding:2px 14px 14px}
.slabel{font-size:9.5px;letter-spacing:3px;font-weight:800;text-transform:uppercase;color:#64748b;text-align:center;padding-bottom:8px}
.mystery-row{display:flex;justify-content:center;gap:4px}
.my-col{text-align:center}
.my-box{width:30px;height:30px;border:2px solid #0f172a;background:#FFE500;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#111}
.my-num{font-size:8px;color:#94a3b8;margin-top:2px}
.ctrl{display:flex;justify-content:center;gap:8px;padding:0 14px 14px;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:11px;letter-spacing:1.5px;font-weight:700;cursor:pointer;touch-action:manipulation}
.btn-v{background:#fbbf24;color:#0f172a}
.btn-e{background:#0f172a;color:#fff}
.clues-section{padding:0 14px 20px;max-width:500px;margin:0 auto}
.clues-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grp-title{font-size:9.5px;letter-spacing:2px;font-weight:800;border-bottom:2px solid #0f172a;padding-bottom:4px;margin-bottom:8px;color:#0f172a}
.ce{font-size:12px;line-height:1.5;padding:3px 5px;margin-bottom:4px;border-radius:4px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;color:#374151}
.ce:hover{background:#e2e8f0}
.ce.ah{background:#fef9c3;border-left-color:#fbbf24}
.ce.av{background:#dbeafe;border-left-color:#2563eb}
.vkb{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#d1d9e0;border-top:1px solid #b0bac3;padding:7px 4px env(safe-area-inset-bottom,8px)}
.kb-row{display:flex;justify-content:center;gap:4px;margin-bottom:5px}
.kb-row:last-child{margin-bottom:0}
.k{height:44px;background:#fff;border:none;border-bottom:3px solid #8a94a0;border-radius:5px;font-size:15px;font-weight:600;color:#0f172a;cursor:pointer;flex:1;max-width:34px;min-width:22px;display:flex;align-items:center;justify-content:center;user-select:none}
.k:active{transform:translateY(2px);border-bottom-width:1px}
.k.spec{background:#adb5bd;color:#0f172a;max-width:52px;font-size:13px;border-bottom-color:#6c757d}
.k.dir{background:#2563eb;color:#fff;max-width:52px;font-size:16px;border-bottom-color:#1d4ed8}
.k.dir.off{background:#93c5fd;border-bottom-color:#60a5fa}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">MOTS CROISÉS</div>
  <div class="clue-bar" id="clue-bar">
    <span class="cph">Appuyez sur une case pour commencer</span>
  </div>
</header>

<div class="grid-area"><div class="cw-grid" id="grid"></div></div>

<div id="success">🌿 Bravo ! Le mot mystère est BRIMBELLE ! 🌿</div>

<div class="mystery-section">
  <div class="slabel">Mot Mystère</div>
  <div class="mystery-row" id="mrow"></div>
</div>

<div class="ctrl">
  <button class="btn btn-v" onclick="verifyAll()">VÉRIFIER</button>
  <button class="btn btn-e" onclick="clearAll()">EFFACER TOUT</button>
</div>

<div class="clues-section">
  <div class="clues-cols">
    <div><div class="grp-title">→ Horizontal</div><div id="clues-h"></div></div>
    <div><div class="grp-title">↓ Vertical</div><div id="clues-v"></div></div>
  </div>
</div>

<div class="vkb">
  <div class="kb-row" id="kb0"></div>
  <div class="kb-row" id="kb1"></div>
  <div class="kb-row" id="kb2"></div>
</div>

<script>
/* ── CONFIGURATION ── */
const WORDS = [
  {id:1,dir:'h',r:3, c:0, len:8,yr:3,yc:0, mp:1,ans:'BOULEAUX'},
  {id:2,dir:'v',r:2, c:5, len:6,yr:2,yc:5, mp:2,ans:'RACINE'  },
  {id:3,dir:'h',r:5, c:9, len:5,yr:5,yc:12,mp:3,ans:'SAPIN'   },
  {id:4,dir:'h',r:9, c:1, len:5,yr:9,yc:4, mp:4,ans:'GRUME'   },
  {id:5,dir:'v',r:5, c:1, len:8,yr:5,yc:1, mp:5,ans:'BOURGEON'},
  {id:6,dir:'v',r:2, c:3, len:8,yr:7,yc:3, mp:6,ans:'BLAIREAU'},
  {id:7,dir:'v',r:0, c:7, len:4,yr:0,yc:7, mp:7,ans:'LYNX'    },
  {id:8,dir:'v',r:4, c:10,len:4,yr:4,yc:10,mp:8,ans:'LAIE'    },
  {id:9,dir:'h',r:7, c:5, len:6,yr:7,yc:5, mp:9,ans:'ECORCE'  },
];

const CLUES = {
  h:{1:"Définition à venir…",3:"Définition à venir…",4:"Définition à venir…",9:"Définition à venir…"},
  v:{2:"Définition à venir…",5:"Définition à venir…",6:"Définition à venir…",7:"Définition à venir…",8:"Définition à venir…"}
};

/* Build answers + cell map */
const ANS={}, CM={};
const GR=13, GC=14;

WORDS.forEach(w=>{
  for(let i=0;i<w.len;i++){
    const r=w.dir==='v'?w.r+i:w.r, c=w.dir==='h'?w.c+i:w.c, k=`${r},${c}`;
    ANS[k]=w.ans[i];
    if(!CM[k]) CM[k]={r,c,entries:[],num:null,yellow:false,mp:null};
    CM[k].entries.push({wid:w.id,dir:w.dir,idx:i});
    if(i===0) CM[k].num=w.id;
    if(r===w.yr&&c===w.yc){CM[k].yellow=true;CM[k].mp=w.mp;}
  }
});

/* State */
let LT={}, VER={}, SK=null, SD='h';

/* Render grid */
const gridEl=document.getElementById('grid');
gridEl.style.gridTemplateColumns=`repeat(${GC},36px)`;
gridEl.style.gridTemplateRows=`repeat(${GR},36px)`;
const EL={};
for(let r=0;r<GR;r++){
  for(let c=0;c<GC;c++){
    const k=`${r},${c}`,cd=CM[k],el=document.createElement('div');
    el.className='gc'+(cd?' on':'');
    if(cd){
      if(cd.num){const nl=document.createElement('span');nl.className='nl';nl.textContent=cd.num;el.appendChild(nl);}
      const lt=document.createElement('span');lt.className='lt';el.appendChild(lt);
      el.addEventListener('click',()=>tapCell(k));
    }
    EL[k]=el; gridEl.appendChild(el);
  }
}

/* Render mystery */
const mrow=document.getElementById('mrow');
for(let i=1;i<=9;i++){
  const col=document.createElement('div');
  col.className='my-col';
  col.innerHTML=`<div class="my-box" id="my-${i}"></div><div class="my-num">${i}</div>`;
  mrow.appendChild(col);
}

/* Render clues */
['h','v'].forEach(dir=>{
  const cont=document.getElementById(`clues-${dir}`);
  Object.entries(CLUES[dir]).sort(([a],[b])=>+a-+b).forEach(([id,txt])=>{
    const el=document.createElement('div');
    el.className='ce'; el.id=`ce-${dir}-${id}`;
    el.innerHTML=`<strong>${id}.</strong> ${txt}`;
    el.addEventListener('click',()=>jumpWord(+id,dir));
    cont.appendChild(el);
  });
});

/* Helpers */
function getW(id){return WORDS.find(w=>w.id===id);}
function wKeys(w){
  const ks=[];
  for(let i=0;i<w.len;i++){
    const r=w.dir==='v'?w.r+i:w.r,c=w.dir==='h'?w.c+i:w.c;
    ks.push(`${r},${c}`);
  }
  return ks;
}
function activeW(){
  if(!SK) return null;
  const cd=CM[SK]; if(!cd) return null;
  let e=cd.entries.find(x=>x.dir===SD);
  if(!e){e=cd.entries[0];if(e) SD=e.dir;}
  return e?getW(e.wid):null;
}

/* Actions */
function tapCell(k){
  const cd=CM[k]; if(!cd) return;
  const dirs=[...new Set(cd.entries.map(e=>e.dir))];
  if(SK===k&&dirs.length>1) SD=SD==='h'?'v':'h';
  else{SK=k;if(!dirs.includes(SD)) SD=dirs[0];}
  redraw();
}

function typeKey(ch){
  if(!SK) return;
  LT[SK]=ch; delete VER[SK];
  EL[SK].querySelector('.lt').textContent=ch;
  updateMystery(); advance(1);
}

function backspace(){
  if(!SK) return;
  if(LT[SK]){
    delete LT[SK]; delete VER[SK];
    EL[SK].querySelector('.lt').textContent='';
    updateMystery();
  } else advance(-1);
}

function advance(d){
  const aw=activeW(); if(!aw) return;
  const e=CM[SK].entries.find(x=>x.dir===SD); if(!e) return;
  const ni=e.idx+d; if(ni<0||ni>=aw.len) return;
  const r=aw.dir==='v'?aw.r+ni:aw.r,c=aw.dir==='h'?aw.c+ni:aw.c;
  SK=`${r},${c}`; redraw();
}

function toggleDir(){
  if(!SK) return;
  const cd=CM[SK]; if(!cd) return;
  const dirs=[...new Set(cd.entries.map(e=>e.dir))];
  if(dirs.length>1){SD=SD==='h'?'v':'h';redraw();}
}

function jumpWord(id,dir){
  const w=WORDS.find(x=>x.id===id&&x.dir===dir); if(!w) return;
  SK=`${w.r},${w.c}`; SD=dir; redraw();
  gridEl.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function verifyAll(){
  VER={};
  let allOk=true;
  Object.keys(CM).forEach(k=>{
    const entered=LT[k]||'', expected=ANS[k];
    if(!entered){allOk=false;}
    else if(entered===expected){VER[k]='ok';}
    else{VER[k]='ko'; allOk=false;}
  });
  document.getElementById('success').style.display=allOk?'block':'none';
  redraw();
}

function clearAll(){
  LT={}; VER={}; SK=null;
  Object.keys(CM).forEach(k=>{const lt=EL[k]?.querySelector('.lt');if(lt) lt.textContent='';});
  updateMystery();
  document.getElementById('success').style.display='none';
  redraw();
}

function updateMystery(){
  WORDS.forEach(w=>{
    const el=document.getElementById(`my-${w.mp}`);
    if(el) el.textContent=LT[`${w.yr},${w.yc}`]||'';
  });
}

/* Redraw */
function redraw(){
  const aw=activeW(), wkSet=new Set(aw?wKeys(aw):[]);
  Object.keys(CM).forEach(k=>{
    const cd=CM[k],el=EL[k]; if(!el||!cd) return;
    el.classList.remove('yi','hi','yhi','ok','ko','sel');
    const isSel=k===SK,isHi=wkSet.has(k),isYel=cd.yellow,ver=VER[k];
    if(isSel)          el.classList.add('sel');
    else if(ver==='ok') el.classList.add('ok');
    else if(ver==='ko') el.classList.add('ko');
    else if(isHi&&isYel) el.classList.add('yhi');
    else if(isHi)       el.classList.add('hi');
    else if(isYel)      el.classList.add('yi');
  });
  const bar=document.getElementById('clue-bar');
  if(aw){
    const clue=CLUES[aw.dir]?.[aw.id]||'…';
    bar.innerHTML=`<span class="cbadge">${aw.id} ${aw.dir==='h'?'→':'↓'}</span><span class="ctxt">${clue}</span>`;
  } else {
    bar.innerHTML='<span class="cph">Appuyez sur une case pour commencer</span>';
  }
  document.querySelectorAll('.ce').forEach(el=>el.classList.remove('ah','av'));
  if(aw){const ce=document.getElementById(`ce-${aw.dir}-${aw.id}`);if(ce) ce.classList.add(aw.dir==='h'?'ah':'av');}
  const cd=SK?CM[SK]:null;
  const canToggle=cd&&[...new Set(cd.entries.map(e=>e.dir))].length>1;
  const dirBtn=document.getElementById('dir-btn');
  if(dirBtn){dirBtn.textContent=SD==='h'?'→':'↓';dirBtn.classList.toggle('off',!canToggle);}
}

/* Keyboard */
const KB=[
  ['A','Z','E','R','T','Y','U','I','O','P'],
  ['Q','S','D','F','G','H','J','K','L','M'],
  ['W','X','C','V','B','N','⌫','DIR'],
];
KB.forEach((row,ri)=>{
  const rowEl=document.getElementById(`kb${ri}`);
  row.forEach(key=>{
    const btn=document.createElement('button');
    btn.className='k';
    if(key==='⌫'){
      btn.classList.add('spec');btn.textContent='⌫';
      btn.addEventListener('click',backspace);
    } else if(key==='DIR'){
      btn.classList.add('dir');btn.id='dir-btn';btn.textContent='→';
      btn.addEventListener('click',toggleDir);
    } else {
      btn.textContent=key;
      btn.addEventListener('click',()=>typeKey(key));
    }
    rowEl.appendChild(btn);
  });
});

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(e.key.length===1&&/[a-zA-ZÀ-ÿ]/.test(e.key)){
    typeKey(e.key.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
    e.preventDefault();
  } else if(e.key==='Backspace'){backspace();e.preventDefault();}
});

updateMystery();
redraw();
</script>
</body>
</html>
