<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mots Croisés</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F0C96A;
    --gold-dark: #A07820;
    --bg: #F5F0E8;
    --paper: #FDFAF4;
    --ink: #1A1A2E;
    --ink-light: #4A4A6A;
    --correct: #4CAF50;
    --wrong: #E53935;
    --S: 38px;
    --G: 3px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--ink);
    color: var(--gold);
    text-align: center;
    padding: 16px 16px 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  header h1 { font-family:'Playfair Display',serif; font-size:1.5rem; letter-spacing:.05em; }
  header p  { font-size:.72rem; color:#aaa; margin-top:3px; letter-spacing:.08em; text-transform:uppercase; }

  .tabs { display:flex; background:var(--ink); border-top:1px solid #333; }
  .tab {
    flex:1; padding:10px 0; text-align:center;
    font-size:.76rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:#888; cursor:pointer; transition:all .2s;
    border-bottom:3px solid transparent;
  }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  .panel { display:none; padding:14px; }
  .panel.active { display:block; }

  /* ── GRID ── */
  #panel-grid { padding:12px 8px; }
  .grid-scroll { overflow-x:auto; overflow-y:auto; padding-bottom:4px; }
  .grid-area { position:relative; margin:0 auto; }

  .cell {
    position:absolute;
    width:var(--S); height:var(--S);
    border:1.5px solid #bbb;
    background:var(--paper);
    border-radius:3px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition: background .12s;
  }
  .cell.gold         { background:var(--gold-light); border-color:var(--gold-dark); }
  .cell.highlighted  { background:rgba(212,168,67,.25); }
  .cell.gold.highlighted { background:var(--gold); }
  .cell.active-cell  { background:var(--ink) !important; border-color:var(--ink); }
  .cell.correct      { background:rgba(76,175,80,.28) !important; border-color:var(--correct); }
  .cell.wrong        { background:rgba(229,57,53,.2) !important; border-color:var(--wrong); }
  .cell.gold.correct { background:rgba(76,175,80,.5) !important; }
  .cell.gold.wrong   { background:rgba(229,57,53,.38) !important; }

  .cell-number {
    position:absolute; top:1px; left:2px;
    font-size:9px; font-weight:700; color:var(--ink-light);
    line-height:1; pointer-events:none; z-index:2;
  }
  .cell.active-cell .cell-number { color:#aaa; }

  .cell input {
    position:absolute; inset:0;
    width:100%; height:100%;
    border:none; background:transparent;
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:1.1rem; font-weight:700;
    color:var(--ink);
    text-transform:uppercase;
    outline:none; cursor:pointer;
    caret-color:transparent;
    padding:0;
    -webkit-user-select:none; user-select:none;
  }
  .cell.active-cell input { color:var(--gold); }

  .progress-wrap { background:#ddd; border-radius:99px; height:6px; margin:0 0 4px; overflow:hidden; }
  .progress-bar  { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-dark)); border-radius:99px; transition:width .4s; width:0%; }
  .progress-label{ font-size:.72rem; color:var(--ink-light); text-align:right; margin-bottom:10px; }

  .btn-row { display:flex; gap:8px; justify-content:center; margin:14px 0 6px; flex-wrap:wrap; }
  .btn {
    padding:10px 20px; border-radius:24px; border:none;
    font-family:'Lato',sans-serif; font-weight:700; font-size:.8rem;
    letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
    transition:all .18s; -webkit-tap-highlight-color:transparent;
  }
  .btn-primary  { background:var(--ink); color:var(--gold); }
  .btn-primary:active { transform:scale(.95); }
  .btn-outline  { background:transparent; color:var(--ink); border:2px solid var(--ink); }
  .btn-outline:active { background:var(--ink); color:var(--gold); }

  .success-banner {
    display:none; background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    color:var(--ink); text-align:center; padding:14px; border-radius:10px;
    margin:10px 0; font-family:'Playfair Display',serif; font-size:1.05rem;
    animation: pop .4s ease;
  }
  @keyframes pop { 0%{transform:scale(.8);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }

  /* ── MYSTERY ── */
  .mystery-section {
    background:var(--paper); border-radius:12px; padding:16px;
    margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,.08);
  }
  .mystery-section h3 {
    font-family:'Playfair Display',serif; color:var(--gold-dark);
    font-size:1.05rem; margin-bottom:12px; text-align:center;
  }
  .mystery-cells { display:flex; justify-content:center; gap:5px; flex-wrap:wrap; }
  .mystery-cell {
    width:32px; height:42px;
    border:2px solid var(--gold); background:var(--gold-light);
    border-radius:5px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
  }
  .mystery-letter {
    font-family:'Playfair Display',serif; font-size:1.1rem;
    font-weight:700; color:var(--ink); min-height:1.2em; line-height:1;
  }
  .mystery-num { font-size:.62rem; font-weight:700; color:var(--gold-dark); }

  /* ── VIRTUAL KEYBOARD ── */
  .keyboard {
    position:fixed; bottom:0; left:0; right:0;
    background:#1A1A2E; padding:8px 4px 10px;
    display:none; z-index:200;
    box-shadow:0 -4px 16px rgba(0,0,0,.4);
  }
  .keyboard.visible { display:block; }
  .kb-row { display:flex; justify-content:center; gap:4px; margin-bottom:4px; }
  .kb-key {
    min-width:29px; height:40px; padding:0 5px;
    border-radius:6px; background:#2E2E4E; color:#eee;
    border:none; font-family:'Lato',sans-serif; font-weight:700; font-size:.85rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background .1s;
    -webkit-tap-highlight-color:transparent; user-select:none;
  }
  .kb-key:active { background:var(--gold); color:var(--ink); }
  .kb-key.special { min-width:50px; background:#3E3E5E; font-size:.7rem; }
  .kb-key.close-kb { background:#444; }
  body.kb-open { padding-bottom:132px; }
</style>
</head>
<body>

<header>
  <h1>Mots Croisés</h1>
  <p>Trouve le mot mystère ✦</p>
</header>

<div class="tabs">
  <div class="tab active" data-tab="grid">Grille</div>
  <div class="tab" data-tab="mystery">Mot mystère</div>
</div>

<!-- GRID -->
<div class="panel active" id="panel-grid">
  <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
  <div class="progress-label" id="progress-label">0 / 0 lettres</div>
  <div class="grid-scroll">
    <div class="grid-area" id="grid-area"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="verifyAll()">Vérifier</button>
    <button class="btn btn-outline" onclick="revealAll()">Révéler</button>
    <button class="btn btn-outline" onclick="clearAll()">Effacer</button>
  </div>
  <div class="success-banner" id="success">🎉 Bravo ! Grille complétée !</div>
</div>

<!-- MYSTERY -->
<div class="panel" id="panel-mystery">
  <div class="mystery-section">
    <h3>✦ Mot Mystère</h3>
    <p style="text-align:center;font-size:.82rem;color:var(--ink-light);margin-bottom:14px;">
      Les cases dorées révèlent le mot mystère
    </p>
    <div class="mystery-cells" id="mystery-cells"></div>
  </div>
</div>

<!-- KEYBOARD -->
<div class="keyboard" id="keyboard">
  <div class="kb-row">
    <button class="kb-key" onclick="kbType('A')">A</button>
    <button class="kb-key" onclick="kbType('Z')">Z</button>
    <button class="kb-key" onclick="kbType('E')">E</button>
    <button class="kb-key" onclick="kbType('R')">R</button>
    <button class="kb-key" onclick="kbType('T')">T</button>
    <button class="kb-key" onclick="kbType('Y')">Y</button>
    <button class="kb-key" onclick="kbType('U')">U</button>
    <button class="kb-key" onclick="kbType('I')">I</button>
    <button class="kb-key" onclick="kbType('O')">O</button>
    <button class="kb-key" onclick="kbType('P')">P</button>
  </div>
  <div class="kb-row">
    <button class="kb-key" onclick="kbType('Q')">Q</button>
    <button class="kb-key" onclick="kbType('S')">S</button>
    <button class="kb-key" onclick="kbType('D')">D</button>
    <button class="kb-key" onclick="kbType('F')">F</button>
    <button class="kb-key" onclick="kbType('G')">G</button>
    <button class="kb-key" onclick="kbType('H')">H</button>
    <button class="kb-key" onclick="kbType('J')">J</button>
    <button class="kb-key" onclick="kbType('K')">K</button>
    <button class="kb-key" onclick="kbType('L')">L</button>
    <button class="kb-key" onclick="kbType('M')">M</button>
  </div>
  <div class="kb-row">
    <button class="kb-key special" onclick="moveToPrev()">◀ Préc</button>
    <button class="kb-key" onclick="kbType('W')">W</button>
    <button class="kb-key" onclick="kbType('X')">X</button>
    <button class="kb-key" onclick="kbType('C')">C</button>
    <button class="kb-key" onclick="kbType('V')">V</button>
    <button class="kb-key" onclick="kbType('B')">B</button>
    <button class="kb-key" onclick="kbType('N')">N</button>
    <button class="kb-key special" onclick="kbBackspace()">⌫</button>
    <button class="kb-key special close-kb" onclick="closeKeyboard()">✕</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  GRID DATA  (corrected layout from user)
// ═══════════════════════════════════════════════════════
const cellData = [
  // Mot 1 (Horizontal, 8 lettres)
  {x:0,y:3,num:1,yellow:true, mysteryId:1},{x:1,y:3},{x:2,y:3},{x:3,y:3},{x:4,y:3},{x:5,y:3},{x:6,y:3},{x:7,y:3},
  // Mot 2 (Vertical, 5 lettres)
  {x:5,y:2,num:2,yellow:true, mysteryId:2},{x:5,y:3},{x:5,y:4},{x:5,y:5},{x:5,y:6},
  // Mot 3 (Horizontal, 5 lettres)
  {x:9,y:5,num:3},{x:10,y:5},{x:11,y:5},{x:12,y:5,yellow:true,mysteryId:3},{x:13,y:5},
  // Mot 4 (Horizontal, 5 lettres)
  {x:1,y:9,num:4},{x:2,y:9},{x:3,y:9},{x:4,y:9,yellow:true,mysteryId:4},{x:5,y:9},
  // Mot 5 (Vertical, 7 lettres)
  {x:1,y:5,num:5,yellow:true,mysteryId:5},{x:1,y:6},{x:1,y:7},{x:1,y:8},{x:1,y:9},{x:1,y:10},{x:1,y:11},
  // Mot 6 (Vertical, 7 lettres — length from data: y:2..y:8)
  {x:3,y:2,num:6},{x:3,y:3},{x:3,y:4},{x:3,y:5},{x:3,y:6,yellow:true,mysteryId:6},{x:3,y:7},{x:3,y:8},
  // Mot 7 (Vertical, 4 lettres)
  {x:7,y:0,num:7,yellow:true,mysteryId:7},{x:7,y:1},{x:7,y:2},{x:7,y:3},
  // Mot 8 (Vertical, 3 lettres)
  {x:10,y:4,num:8,yellow:true,mysteryId:8},{x:10,y:5},{x:10,y:6},
  // Mot 9 (Horizontal, 6 lettres)
  {x:5,y:7,num:9,yellow:true,mysteryId:9},{x:6,y:7},{x:7,y:7},{x:8,y:7},{x:9,y:7},{x:10,y:7},
];

// ── Word membership: detect words from consecutive cells ──
// We'll derive word cell lists from the data
const words = [
  {id:1, dir:'h', cells: cellData.slice(0,8).map(c=>key(c.x,c.y))},
  {id:2, dir:'v', cells: [key(5,2),key(5,3),key(5,4),key(5,5),key(5,6)]},
  {id:3, dir:'h', cells: [key(9,5),key(10,5),key(11,5),key(12,5),key(13,5)]},
  {id:4, dir:'h', cells: [key(1,9),key(2,9),key(3,9),key(4,9),key(5,9)]},
  {id:5, dir:'v', cells: [key(1,5),key(1,6),key(1,7),key(1,8),key(1,9),key(1,10),key(1,11)]},
  {id:6, dir:'v', cells: [key(3,2),key(3,3),key(3,4),key(3,5),key(3,6),key(3,7),key(3,8)]},
  {id:7, dir:'v', cells: [key(7,0),key(7,1),key(7,2),key(7,3)]},
  {id:8, dir:'v', cells: [key(10,4),key(10,5),key(10,6)]},
  {id:9, dir:'h', cells: [key(5,7),key(6,7),key(7,7),key(8,7),key(9,7),key(10,7)]},
];

// ── State ──
let cells = {};
let activeCell = null;
let activeDir  = 'h';
let activeWordCells = [];

function key(x,y){ return `${x},${y}`; }

// ── Build lookup ──
cellData.forEach(cd => {
  const k = key(cd.x, cd.y);
  if (!cells[k]) {
    cells[k] = {
      x: cd.x, y: cd.y,
      gold: !!cd.yellow,
      mysteryId: cd.mysteryId || null,
      num: cd.num || null,
      wordMembership: [],
      el: null, inp: null
    };
  } else {
    // merge
    if (cd.yellow) cells[k].gold = true;
    if (cd.mysteryId) cells[k].mysteryId = cd.mysteryId;
    if (cd.num) cells[k].num = cd.num;
  }
});
words.forEach(w => {
  w.cells.forEach(k => {
    if (cells[k]) cells[k].wordMembership.push(w.id);
  });
});

// ── Render grid ──
function initGrid() {
  const S = 38, G = 3, step = S + G;
  const xs = Object.values(cells).map(c=>c.x);
  const ys = Object.values(cells).map(c=>c.y);
  const minX = Math.min(...xs), minY = Math.min(...ys);
  const maxX = Math.max(...xs), maxY = Math.max(...ys);

  const area = document.getElementById('grid-area');
  area.style.width  = ((maxX-minX+1)*step)+'px';
  area.style.height = ((maxY-minY+1)*step)+'px';

  Object.entries(cells).forEach(([k, cd]) => {
    const el = document.createElement('div');
    el.className = 'cell' + (cd.gold ? ' gold' : '');
    el.style.left = ((cd.x-minX)*step)+'px';
    el.style.top  = ((cd.y-minY)*step)+'px';

    if (cd.num) {
      const n = document.createElement('span');
      n.className = 'cell-number';
      n.textContent = cd.num;
      el.appendChild(n);
    }

    const inp = document.createElement('input');
    inp.type='text'; inp.maxLength=1;
    inp.inputMode='none';
    inp.autocomplete='off'; inp.autocorrect='off'; inp.spellcheck=false;
    el.appendChild(inp);
    area.appendChild(el);

    cd.el = el; cd.inp = inp;
    el.addEventListener('pointerdown', e => { e.preventDefault(); activateCell(k); });
    inp.addEventListener('keydown', onKeyDown);
  });

  updateProgress();
}

// ── Activation & highlight ──
function activateCell(k) {
  if (!cells[k]) return;

  // Clear old
  if (activeCell) cells[activeCell].el.classList.remove('active-cell');
  activeWordCells.forEach(ck => cells[ck]?.el.classList.remove('highlighted'));

  activeCell = k;
  const cd = cells[k];

  // Pick direction
  const wm = cd.wordMembership;
  if (wm.length === 0) return;

  // Find which word dirs are available
  const availDirs = wm.map(wid => words.find(w=>w.id===wid).dir);
  if (!availDirs.includes(activeDir)) activeDir = availDirs[0];

  // If same cell tapped again, toggle direction
  const w = words.find(w => w.cells.includes(k) && w.dir === activeDir)
          || words.find(w => w.cells.includes(k));
  activeDir = w.dir;

  activeWordCells = w.cells;
  activeWordCells.forEach(ck => { if(ck!==k) cells[ck]?.el.classList.add('highlighted'); });

  cd.el.classList.add('active-cell');
  cd.inp.focus({preventScroll:true});
  showKeyboard();
  updateMystery();
}

// ── Toggle dir on double tap same cell ──
let lastTapped = null;
document.getElementById('grid-area').addEventListener('pointerdown', e => {
  const el = e.target.closest('.cell');
  if (!el) return;
  // find key
  const k = Object.keys(cells).find(k2 => cells[k2].el === el);
  if (!k) return;
  if (k === activeCell) {
    // Toggle
    const wm = cells[k].wordMembership;
    if (wm.length > 1) {
      const curW = words.find(w=>w.cells.includes(k)&&w.dir===activeDir);
      const otherW = words.find(w=>w.cells.includes(k)&&w.dir!==activeDir);
      if (otherW) { activeDir = otherW.dir; activateCell(k); }
    }
  }
}, {capture:true});

// ── Keyboard ──
function kbType(letter) {
  if (!activeCell) return;
  cells[activeCell].inp.value = letter;
  cells[activeCell].el.classList.remove('correct','wrong');
  updateProgress(); updateMystery();
  moveToNext();
}
function kbBackspace() {
  if (!activeCell) return;
  if (cells[activeCell].inp.value) {
    cells[activeCell].inp.value = '';
    cells[activeCell].el.classList.remove('correct','wrong');
    updateProgress(); updateMystery();
  } else { moveToPrev(); }
}
function moveToNext() {
  const idx = activeWordCells.indexOf(activeCell);
  if (idx < activeWordCells.length-1) activateCell(activeWordCells[idx+1]);
}
function moveToPrev() {
  const idx = activeWordCells.indexOf(activeCell);
  if (idx > 0) activateCell(activeWordCells[idx-1]);
}
function onKeyDown(e) {
  if (e.key==='Tab')           { e.preventDefault(); toggleDir(); return; }
  if (e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); moveToNext(); }
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   { e.preventDefault(); moveToPrev(); }
  if (e.key==='Backspace')     { e.preventDefault(); kbBackspace(); }
  if (e.key.length===1 && /[a-zA-ZÀ-ÿ]/.test(e.key)) { e.preventDefault(); kbType(e.key.toUpperCase()); }
}
function toggleDir() {
  if (!activeCell) return;
  const wm = cells[activeCell].wordMembership;
  if (wm.length<2) return;
  activeDir = activeDir==='h'?'v':'h';
  activateCell(activeCell);
}
function showKeyboard() {
  document.getElementById('keyboard').classList.add('visible');
  document.body.classList.add('kb-open');
}
function closeKeyboard() {
  document.getElementById('keyboard').classList.remove('visible');
  document.body.classList.remove('kb-open');
  if (activeCell) {
    cells[activeCell].el.classList.remove('active-cell');
    activeWordCells.forEach(ck => cells[ck]?.el.classList.remove('highlighted'));
    activeCell = null;
  }
}

// ── Verify / Reveal / Clear (no answers stored → just highlight completion) ──
function verifyAll() {
  // Without answer data, just mark filled cells and check grid completeness
  let allFilled = true;
  Object.values(cells).forEach(cd => {
    if (!cd.inp.value) allFilled = false;
  });
  if (allFilled) document.getElementById('success').style.display='block';
}
function revealAll() { /* answers not provided — no-op */ }
function clearAll() {
  Object.values(cells).forEach(cd => {
    cd.inp.value = '';
    cd.el.classList.remove('correct','wrong');
  });
  document.getElementById('success').style.display='none';
  updateProgress(); updateMystery();
}

// ── Progress ──
function updateProgress() {
  const total  = Object.keys(cells).length;
  const filled = Object.values(cells).filter(c=>c.inp.value).length;
  const pct = total>0 ? Math.round(filled/total*100) : 0;
  document.getElementById('progress').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${filled} / ${total} lettres`;
}

// ── Mystery word ──
const MYSTERY_COUNT = 9;
function buildMysteryUI() {
  const cont = document.getElementById('mystery-cells');
  for (let i=1; i<=MYSTERY_COUNT; i++) {
    const div = document.createElement('div');
    div.className = 'mystery-cell';
    const letter = document.createElement('div');
    letter.className = 'mystery-letter';
    letter.id = `ml-${i}`;
    const num = document.createElement('div');
    num.className = 'mystery-num';
    num.textContent = i;
    div.appendChild(letter); div.appendChild(num);
    cont.appendChild(div);
  }
}
function updateMystery() {
  for (let i=1; i<=MYSTERY_COUNT; i++) {
    const el = document.getElementById(`ml-${i}`);
    if (!el) continue;
    const cd = Object.values(cells).find(c=>c.mysteryId===i);
    el.textContent = cd ? (cd.inp.value||'') : '';
  }
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x===t));
    document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id===`panel-${t.dataset.tab}`));
  });
});

// ── Init ──
initGrid();
buildMysteryUI();
updateMystery();
</script>
</body>
</html>
